services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-conversation_stats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conversation_stats}
      POSTGRES_DB: ${POSTGRES_DB:-conversation_stats}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conversation_stats}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gotenberg:
    # Chromium-based HTML -> PDF conversion for the exportable client report.
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-allow-list=.*

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      APP_ROLE: api
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-conversation_stats}:${POSTGRES_PASSWORD:-conversation_stats}@db:5432/${POSTGRES_DB:-conversation_stats}
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/2
      REDIS_PUBSUB_URL: redis://redis:6379/3
      GOTENBERG_URL: http://gotenberg:3000
      PRELOAD_MODELS: "false"
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface/hub
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started

  # Automatic scheduler disabled: the rapport pipeline now runs on request only
  # (POST /api/pipeline/run spawns its own subprocess inside the `api` container).
  # To re-enable periodic runs, uncomment this service and set SCHEDULED_AGENT_IDS.
  # scheduler:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   command: /app/scripts/scheduler-loop.sh
  #   env_file:
  #     - .env
  #   environment:
  #     APP_ROLE: scheduler
  #     DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-conversation_stats}:${POSTGRES_PASSWORD:-conversation_stats}@db:5432/${POSTGRES_DB:-conversation_stats}
  #     REDIS_URL: redis://redis:6379/0
  #     REDIS_CACHE_URL: redis://redis:6379/2
  #     REDIS_PUBSUB_URL: redis://redis:6379/3
  #     PRELOAD_MODELS: "true"
  #     HF_HOME: /app/.cache/huggingface
  #     TRANSFORMERS_CACHE: /app/.cache/huggingface/hub
  #   volumes:
  #     - hf_cache:/app/.cache/huggingface
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  hf_cache:
